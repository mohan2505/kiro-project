<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpWave - Emergency Alert</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="flash-overlay" class="flash-overlay"></div>
        
        <div class="content">
            <h1 class="title">HelpWave</h1>
            <p class="subtitle">Emergency Alert System</p>
            
            <button id="help-btn" class="help-button">
                HELP!
            </button>
            
            <div id="message" class="message hidden">
                <h2>🚨 EMERGENCY ALERT ACTIVE 🚨</h2>
                <p>Help is being requested!</p>
            </div>
            
            <button id="stop-btn" class="stop-button hidden">
                STOP ALERT
            </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
